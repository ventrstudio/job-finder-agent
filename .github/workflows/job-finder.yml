name: Job Finder Daily Pipeline

on:
  schedule:
    # 8:00 AM ET = 12:00 UTC (during EDT) / 13:00 UTC (during EST)
    # Using 12:00 UTC = 8 AM EDT (March-November). Will be 7 AM EST in winter.
    - cron: '0 12 * * *'
  workflow_dispatch:
    inputs:
      skip_scrape:
        description: 'Skip Apify scrape (reuse jobs already in DB)'
        type: boolean
        default: false
      score_limit:
        description: 'Max jobs to score (blank = use config default of 100)'
        type: string
        default: ''

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run pipeline
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          EMAILIT_API_KEY: ${{ secrets.EMAILIT_API_KEY }}
          APIFY_TOKEN: ${{ secrets.APIFY_TOKEN }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          HEALTHCHECK_URL: ${{ secrets.HEALTHCHECK_URL }}
          SKIP_SCRAPE: ${{ inputs.skip_scrape && '1' || '' }}
          SCORE_LIMIT: ${{ inputs.score_limit }}
        run: python main.py
